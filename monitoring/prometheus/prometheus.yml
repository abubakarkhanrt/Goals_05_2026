global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: transcript-agent
    metrics_path: /metrics
    static_configs:
      # Agent runs on the host; Docker Desktop exposes it as host.docker.internal
      - targets: ["host.docker.internal:9464"]
        labels:
          service: transcript_risk_assessor

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
